<script>
  const el = id => document.getElementById(id);

  let qrTarget = "review";
  let uploadedLogo = null;
  let uploadedHero = null;
  let qrReady = false;
  let qrInstance = null;

  const defaultHero = "https://images.unsplash.com/photo-1581578731548-c64695cc6952?auto=format&fit=crop&w=1600&q=80";

  function getAccent() {
    const map = {
      blue:   { main:"#2f7cf6", dark:"#1f5dd7" },
      gold:   { main:"#f0b62f", dark:"#c48d09" },
      emerald:{ main:"#18b36b", dark:"#0c8a50" },
      violet: { main:"#8b63f7", dark:"#6d42da" }
    };
    return map[el("accentColor").value] || map.blue;
  }

  function setTarget(target) {
    qrTarget = target;

    document.querySelectorAll(".choice").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.target === target);
    });

    el("reviewFieldWrap").style.display = target === "review" ? "" : "none";
    el("websiteFieldWrap").style.display = target === "website" ? "" : "none";
    el("facebookFieldWrap").style.display = target === "facebook" ? "" : "none";
    el("customFieldWrap").style.display = target === "custom" ? "" : "none";

    updateQrLabel();
  }

  function updateQrLabel() {
    const labels = {
      review: "SCAN TO LEAVE A REVIEW",
      website: "SCAN TO VISIT OUR WEBSITE",
      facebook: "SCAN TO VIEW OUR FACEBOOK",
      custom: "SCAN THE QR CODE"
    };
    el("artQrLabel").textContent = labels[qrTarget] || "SCAN THE QR CODE";
  }

  function getQRText() {
    if (qrTarget === "review") return el("reviewLink").value.trim();
    if (qrTarget === "website") return el("websiteLink").value.trim();
    if (qrTarget === "facebook") return el("facebookLink").value.trim();
    if (qrTarget === "custom") return el("customLink").value.trim();
    return "";
  }

  function readFileAsDataURL(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function loadImage(src) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = src;
    });
  }

  function renderBadgeHTML(container) {
    container.innerHTML = "";

    if (el("badgeMode").value === "logo" && uploadedLogo) {
      const img = document.createElement("img");
      img.src = uploadedLogo;
      img.alt = "Logo";
      container.appendChild(img);
      return;
    }

    const wand = document.createElement("div");
    wand.className = "wand-icon";
    container.appendChild(wand);
  }

  function updateThumbs() {
    if (uploadedLogo) {
      el("logoThumb").innerHTML = `<img src="${uploadedLogo}" alt="Logo">`;
    } else {
      el("logoThumb").textContent = "No logo";
    }

    if (uploadedHero) {
      el("heroThumb").innerHTML = `<img src="${uploadedHero}" alt="Background image">`;
    } else {
      el("heroThumb").textContent = "No image";
    }
  }

  function updatePreviewText() {
    el("artCompanyName").textContent = el("companyName").value.trim() || "Your Company Name";
    el("artTagline").textContent = el("tagline").value.trim() || "Professional carpet cleaning";
    el("artHeadline").textContent = el("headlineText").value.trim() || "Thanks for choosing us";
    el("artSubline").textContent = el("sublineText").value.trim() || "If you were happy with the clean, please scan below and leave us a quick review.";
    el("artBottomCopy").textContent = el("bottomText").value.trim() || "Your feedback really helps our business and helps other local customers choose us with confidence.";
    el("artContact").textContent = el("phone").value.trim() || "07802563213";
  }

  function updatePreviewBackground() {
    const src = uploadedHero || defaultHero;
    el("reviewBg").style.backgroundImage = `url("${src}")`;
  }

  function updateAllPreviewOnly() {
    updateQrLabel();
    updateThumbs();
    updatePreviewText();
    updatePreviewBackground();
    renderBadgeHTML(el("reviewBadge"));
  }

  function showMessage(msg, type) {
    const box = el("actionMsg");
    box.textContent = msg;
    box.className = "status show " + (type === "warn" ? "warn" : "ok");
    clearTimeout(window._msgTimer);
    window._msgTimer = setTimeout(() => {
      box.className = "status " + (type === "warn" ? "warn" : "ok");
    }, 2200);
  }

  function generateQR() {
    const text = getQRText();

    if (!text) {
      showMessage("Add a valid link or some text first.", "warn");
      qrReady = false;
      return false;
    }

    const canvas = el("qrPreviewCanvas");
    const accent = getAccent();

    qrInstance = new QRious({
      element: canvas,
      value: text,
      size: 500,
      level: "H",
      foreground: "#000000",
      background: "#ffffff",
      padding: 20
    });

    el("artQrLabel").style.color = accent.dark;
    qrReady = true;
    showMessage("QR generated.", "ok");
    return true;
  }

  function downloadDataUrl(url, filename) {
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    a.click();
  }

  function downloadQR() {
    if (!qrReady) {
      const ok = generateQR();
      if (!ok) return;
    }
    downloadDataUrl(el("qrPreviewCanvas").toDataURL("image/png"), "qr-code.png");
    showMessage("QR code downloaded.", "ok");
  }

  function roundRect(ctx, x, y, w, h, r, fill, stroke) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    if (fill) ctx.fill();
    if (stroke) ctx.stroke();
  }

  function drawWrappedText(ctx, text, x, y, maxWidth, lineHeight) {
    const words = (text || "").split(" ");
    let line = "";
    let yy = y;

    for (let i = 0; i < words.length; i++) {
      const test = line + words[i] + " ";
      if (ctx.measureText(test).width > maxWidth && i > 0) {
        ctx.fillText(line.trim(), x, yy);
        line = words[i] + " ";
        yy += lineHeight;
      } else {
        line = test;
      }
    }
    if (line.trim()) ctx.fillText(line.trim(), x, yy);
  }

  function drawWrappedTextCentered(ctx, text, x, y, maxWidth, lineHeight) {
    const words = (text || "").split(" ");
    let line = "";
    let yy = y;

    for (let i = 0; i < words.length; i++) {
      const test = line + words[i] + " ";
      if (ctx.measureText(test).width > maxWidth && i > 0) {
        ctx.fillText(line.trim(), x, yy);
        line = words[i] + " ";
        yy += lineHeight;
      } else {
        line = test;
      }
    }
    if (line.trim()) ctx.fillText(line.trim(), x, yy);
  }

  async function drawBadgeOnCanvas(ctx, x, y, size) {
    ctx.fillStyle = "rgba(255,255,255,.92)";
    ctx.strokeStyle = "rgba(255,255,255,.72)";
    ctx.lineWidth = 2;
    roundRect(ctx, x, y, size, size, 22, true, true);

    if (el("badgeMode").value === "logo" && uploadedLogo) {
      const img = await loadImage(uploadedLogo);
      ctx.drawImage(img, x + 10, y + 10, size - 20, size - 20);
      return;
    }

    ctx.strokeStyle = "#23446f";
    ctx.lineWidth = 10;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(x + 44, y + 16);
    ctx.lineTo(x + 56, y + 54);
    ctx.stroke();

    ctx.fillStyle = "#6ea4ef";
    roundRect(ctx, x + 22, y + 52, 42, 14, 8, true, false);
  }

  async function renderDesign(canvas, mode) {
    if (!qrReady) {
      const ok = generateQR();
      if (!ok) return false;
    }

    const ctx = canvas.getContext("2d");
    const w = canvas.width;
    const h = canvas.height;
    const accent = getAccent();
    const heroSrc = uploadedHero || defaultHero;

    const company = el("companyName").value.trim() || "Your Company Name";
    const tagline = el("tagline").value.trim() || "Professional carpet cleaning";
    const headline = el("headlineText").value.trim() || "Thanks for choosing us";
    const subline = el("sublineText").value.trim() || "If you were happy with the clean, please scan below and leave us a quick review.";
    const bottomText = el("bottomText").value.trim() || "Your feedback really helps our business and helps other local customers choose us with confidence.";
    const phone = el("phone").value.trim() || "07802563213";

    const heroImg = await loadImage(heroSrc);
    const qrImg = await loadImage(el("qrPreviewCanvas").toDataURL("image/png"));

    ctx.clearRect(0, 0, w, h);

    const scale = Math.max(w / heroImg.width, h / heroImg.height);
    const drawW = heroImg.width * scale;
    const drawH = heroImg.height * scale;
    const drawX = (w - drawW) / 2;
    const drawY = (h - drawH) / 2;

    ctx.drawImage(heroImg, drawX, drawY, drawW, drawH);

    const overlay = ctx.createLinearGradient(0, 0, 0, h);
    overlay.addColorStop(0, "rgba(8,16,29,0.24)");
    overlay.addColorStop(.55, "rgba(8,16,29,0.38)");
    overlay.addColorStop(1, "rgba(8,16,29,0.55)");
    ctx.fillStyle = overlay;
    ctx.fillRect(0, 0, w, h);

    const safeTop = mode === "lock" ? 180 : 90;
    const side = mode === "lock" ? 88 : 78;

    await drawBadgeOnCanvas(ctx, side, safeTop, 112);

    ctx.textAlign = "left";
    ctx.textBaseline = "alphabetic";
    ctx.fillStyle = "#ffffff";
    ctx.font = "800 54px Inter";
    drawWrappedText(ctx, company, side + 138, safeTop + 46, w - side * 2 - 146, 60);

    ctx.fillStyle = "#eef5ff";
    ctx.font = "500 28px Inter";
    drawWrappedText(ctx, tagline, side + 138, safeTop + 92, w - side * 2 - 146, 34);

    ctx.fillStyle = "#ffffff";
    ctx.font = mode === "lock" ? "700 86px Playfair Display" : "700 74px Playfair Display";
    drawWrappedText(ctx, headline, side, safeTop + 200, w - side * 2, mode === "lock" ? 92 : 80);

    ctx.fillStyle = "#f1f6ff";
    ctx.font = mode === "lock" ? "500 34px Inter" : "500 30px Inter";
    drawWrappedText(ctx, subline, side, safeTop + 292, w - side * 2, mode === "lock" ? 44 : 38);

    const qrCardW = mode === "lock" ? 690 : 760;
    const qrCardH = mode === "lock" ? 760 : 840;
    const qrCardX = (w - qrCardW) / 2;
    const qrCardY = mode === "lock" ? h * 0.42 : h * 0.40;

    ctx.shadowColor = "rgba(0,0,0,.28)";
    ctx.shadowBlur = 34;
    ctx.fillStyle = "rgba(255,255,255,.96)";
    roundRect(ctx, qrCardX, qrCardY, qrCardW, qrCardH, 42, true, false);
    ctx.shadowBlur = 0;

    ctx.strokeStyle = "rgba(255,255,255,.72)";
    ctx.lineWidth = 2;
    roundRect(ctx, qrCardX, qrCardY, qrCardW, qrCardH, 42, false, true);

    ctx.textAlign = "center";
    ctx.fillStyle = accent.dark;
    ctx.font = mode === "lock" ? "800 28px Inter" : "800 34px Inter";
    ctx.fillText(el("artQrLabel").textContent, w / 2, qrCardY + 66);

    const qrSize = mode === "lock" ? 500 : 560;
    const qrX = (w - qrSize) / 2;
    const qrY = qrCardY + 105;

    ctx.fillStyle = "#ffffff";
    ctx.strokeStyle = "#e5eef9";
    ctx.lineWidth = 2;
    roundRect(ctx, qrX - 20, qrY - 20, qrSize + 40, qrSize + 40, 28, true, true);
    ctx.drawImage(qrImg, qrX, qrY, qrSize, qrSize);

    ctx.fillStyle = "#f5b300";
    ctx.font = mode === "lock" ? "800 50px Inter" : "800 54px Inter";
    ctx.fillText("★★★★★", w / 2, qrY + qrSize + 110);

    ctx.fillStyle = "#3d587a";
    ctx.font = mode === "lock" ? "500 32px Inter" : "500 34px Inter";
    drawWrappedTextCentered(ctx, bottomText, w / 2, qrY + qrSize + 170, w * 0.72, mode === "lock" ? 42 : 44);

    const pillW = mode === "lock" ? 520 : 560;
    const pillH = mode === "lock" ? 86 : 96;
    const pillX = (w - pillW) / 2;
    const pillY = h - (mode === "lock" ? 240 : 210);

    ctx.fillStyle = "rgba(255,255,255,.92)";
    ctx.strokeStyle = "rgba(255,255,255,.72)";
    ctx.lineWidth = 2;
    roundRect(ctx, pillX, pillY, pillW, pillH, pillH / 2, true, true);

    ctx.fillStyle = "#153055";
    ctx.font = mode === "lock" ? "800 40px Inter" : "800 44px Inter";
    ctx.fillText(phone, w / 2, pillY + pillH / 2 + 14);

    return true;
  }

  async function downloadReviewCard() {
    const canvas = el("exportCanvas");
    const ok = await renderDesign(canvas, "card");
    if (!ok) return;
    const a = document.createElement("a");
    a.href = canvas.toDataURL("image/png");
    a.download = "review-card.png";
    a.click();
    showMessage("Review card downloaded.", "ok");
  }

  async function downloadLockscreen() {
    const canvas = el("lockscreenCanvas");
    const ok = await renderDesign(canvas, "lock");
    if (!ok) return;
    const a = document.createElement("a");
    a.href = canvas.toDataURL("image/png");
    a.download = "lock-screen.png";
    a.click();
    showMessage("Lock screen downloaded.", "ok");
  }

  function loadExample() {
    el("companyName").value = "The Carpet Cleaning Company";
    el("tagline").value = "Professional carpet and upholstery cleaning";
    el("phone").value = "07802563213";
    el("headlineText").value = "Thanks for choosing us";
    el("sublineText").value = "If you were happy with the clean, please scan below and leave us a quick review.";
    el("reviewLink").value = "https://share.google/lSXNdkbJIC5QM8Qu2";
    el("websiteLink").value = "https://www.thecarpetcleaningcrew.co.uk";
    el("facebookLink").value = "https://www.facebook.com";
    el("customLink").value = "Thank you for choosing us";
    el("bottomText").value = "Your feedback really helps our business and helps other local customers choose us with confidence.";
    el("accentColor").value = "blue";
    el("badgeMode").value = "wand";
    uploadedLogo = null;
    uploadedHero = null;
    qrReady = false;
    setTarget("review");
    updateAllPreviewOnly();
    showMessage("Example loaded.", "ok");
  }

  el("logoUpload").addEventListener("change", async function(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    uploadedLogo = await readFileAsDataURL(file);
    updateAllPreviewOnly();
    showMessage("Logo uploaded.", "ok");
  });

  el("heroUpload").addEventListener("change", async function(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    uploadedHero = await readFileAsDataURL(file);
    updateAllPreviewOnly();
    showMessage("Background image uploaded.", "ok");
  });

  document.querySelectorAll(".choice").forEach(btn => {
    btn.addEventListener("click", function() {
      setTarget(btn.dataset.target);
    });
  });

  [
    "companyName",
    "tagline",
    "phone",
    "headlineText",
    "sublineText",
    "reviewLink",
    "websiteLink",
    "facebookLink",
    "customLink",
    "accentColor",
    "badgeMode",
    "bottomText"
  ].forEach(id => {
    el(id).addEventListener("input", updateAllPreviewOnly);
    el(id).addEventListener("change", updateAllPreviewOnly);
  });

  el("generateBtn").addEventListener("click", generateQR);
  el("previewGenerateBtn").addEventListener("click", generateQR);
  el("downloadQrBtn").addEventListener("click", downloadQR);
  el("downloadCardBtn").addEventListener("click", downloadReviewCard);
  el("previewCardBtn").addEventListener("click", downloadReviewCard);
  el("downloadLockBtn").addEventListener("click", downloadLockscreen);
  el("previewLockBtn").addEventListener("click", downloadLockscreen);
  el("exampleBtn").addEventListener("click", loadExample);

  window.addEventListener("load", loadExample);
  </script>
</body>
</html>
