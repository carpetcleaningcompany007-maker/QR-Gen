<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Review Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.3/qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f7fa;
  color:#111;
}

.hero{
  background:url("https://images.unsplash.com/photo-1581578731548-c64695cc6952") center/cover;
  padding:60px 20px;
  text-align:center;
  color:white;
}

.hero h1{
  font-size:32px;
  margin:0;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.box{
  background:white;
  padding:20px;
  border-radius:14px;
  margin-bottom:20px;
}

input, select{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  padding:12px;
  width:100%;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:8px;
  margin-top:10px;
  cursor:pointer;
}

.qr-preview{
  text-align:center;
  margin-top:20px;
}

canvas{
  background:white;
  padding:10px;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="hero">
  <h1>Carpet Cleaner QR Builder</h1>
  <p>Create your review QR in seconds</p>
</div>

<div class="container">

<div class="box">
  <h3>Business Details</h3>

  <input id="name" placeholder="Business Name">
  <input id="tagline" placeholder="Tagline">
  <input id="thanks" placeholder="Thanks message">
  <input id="reviewText" placeholder="Review message">

  <select id="type">
    <option value="google">Google Review</option>
    <option value="facebook">Facebook</option>
    <option value="website">Website</option>
    <option value="custom">Custom Link</option>
  </select>

  <input id="link" placeholder="Paste link here">

  <button onclick="generateQR()">Generate QR</button>
</div>

<div class="box qr-preview">
  <h3>Preview</h3>
  <canvas id="qrCanvas"></canvas>
</div>

<div class="box">
  <button onclick="downloadCard()">Download Review Card</button>
  <button onclick="downloadLock()">Download Lock Screen</button>
</div>

</div>

<script>

let qrData = "";

function generateQR(){
  qrData = document.getElementById("link").value;

  QRCode.toCanvas(document.getElementById("qrCanvas"), qrData, {
    width:200
  });
}

function downloadCard(){

  let canvas = document.createElement("canvas");
  canvas.width = 800;
  canvas.height = 1000;
  let ctx = canvas.getContext("2d");

  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0,0,800,1000);

  ctx.fillStyle = "#000";
  ctx.font = "28px Arial";

  ctx.fillText(document.getElementById("name").value, 50,100);
  ctx.fillText(document.getElementById("thanks").value, 50,180);
  ctx.fillText(document.getElementById("reviewText").value, 50,240);

  QRCode.toCanvas(canvas, qrData, {width:300}, function(){
    let link = document.createElement("a");
    link.download = "review-card.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}

function downloadLock(){

  let canvas = document.createElement("canvas");
  canvas.width = 1080;
  canvas.height = 1920;
  let ctx = canvas.getContext("2d");

  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0,0,1080,1920);

  ctx.fillStyle = "#000";
  ctx.font = "40px Arial";

  ctx.fillText("Scan to Review", 200,300);

  QRCode.toCanvas(canvas, qrData, {width:500}, function(){
    let link = document.createElement("a");
    link.download = "lockscreen.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}

</script>

</body>
</html>
